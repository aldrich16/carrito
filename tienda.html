<!DOCTYPE html>
<html lang="es">
<head>

<title>Tienda TechStore</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">TechStore</div>

<div class="busqueda">

</div>

<div>

</div>

<div class="container">

<div class="grid" id="listaProductos"></div>

</div>

<script src="script.js"></script>

</body>
</html>
