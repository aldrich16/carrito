<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Aldrich Aldama Peña</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#2c3e50;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.carrito{
cursor:pointer;
font-size:20px;
}

.contador{
background:red;
border-radius:50%;
padding:3px 8px;
font-size:12px;
margin-left:5px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

button{
background:#3498db;
border:none;
color:white;
padding:8px 12px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
width:300px;
}

input{
width:90%;
padding:8px;
margin:5px;
}

</style>
</head>

<body>

<header>

<h2>Tienda Aldrich Aldama Peña</h2>

<div class="carrito" onclick="abrirCarrito()">
🛒 <span id="contador" class="contador">0</span>
</div>

</header>

<div class="container">


<div id="loginDiv">

<h3>Login</h3>

<input id="loginUser" placeholder="Usuario"><br>
<input id="loginPass" type="password" placeholder="Contraseña"><br>

<button onclick="login()">Entrar</button>

<p>¿No tienes cuenta?</p>

<button onclick="mostrarRegistro()">Registrarse</button>

</div>


<div id="registroDiv" style="display:none">

<h3>Registro</h3>

<input id="regUser" placeholder="Usuario"><br>
<input id="regPass" type="password" placeholder="Contraseña"><br>

<button onclick="registrar()">Crear cuenta</button><br><br>

<button onclick="volverLogin()">Volver</button>

</div>


<div id="tiendaDiv" style="display:none">

<h3>Productos</h3>

<div class="productos">

<div class="card">
<h4>Laptop</h4>
<p>$1000</p>
<button onclick="agregar('Laptop',1000)">Agregar</button>
</div>

<div class="card">
<h4>Mouse</h4>
<p>$20</p>
<button onclick="agregar('Mouse',20)">Agregar</button>
</div>

<div class="card">
<h4>Teclado</h4>
<p>$50</p>
<button onclick="agregar('Teclado',50)">Agregar</button>
</div>

<div class="card">
<h4>Audífonos</h4>
<p>$80</p>
<button onclick="agregar('Audifonos',80)">Agregar</button>
</div>

</div>

<br>

<button onclick="logout()">Cerrar sesión</button>

</div>

</div>


<div id="modalCarrito" class="modal">

<div class="modal-content">

<h3>Carrito</h3>

<div id="listaCarrito"></div>

<h4 id="total"></h4>

<button onclick="vaciar()">Vaciar carrito</button>
<button onclick="cerrarCarrito()">Cerrar</button>

</div>

</div>

<script>

window.onload = function(){

let sesion = localStorage.getItem("sesion");

if(sesion){
mostrarTienda();
}

actualizarCarrito();

}

function registrar(){

let user = document.getElementById("regUser").value;
let pass = document.getElementById("regPass").value;

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

usuarios.push({user:user, pass:pass});

localStorage.setItem("usuarios", JSON.stringify(usuarios));

alert("Usuario registrado");

volverLogin();

}

function login(){

let user = document.getElementById("loginUser").value;
let pass = document.getElementById("loginPass").value;

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

let valido = usuarios.find(u => u.user === user && u.pass === pass);

if(valido){

localStorage.setItem("sesion", user);

mostrarTienda();

}else{

alert("Usuario o contraseña incorrectos");

}

}

function mostrarTienda(){

document.getElementById("loginDiv").style.display="none";
document.getElementById("registroDiv").style.display="none";
document.getElementById("tiendaDiv").style.display="block";

}

function mostrarRegistro(){

document.getElementById("loginDiv").style.display="none";
document.getElementById("registroDiv").style.display="block";

}

function volverLogin(){

document.getElementById("registroDiv").style.display="none";
document.getElementById("loginDiv").style.display="block";

}

function logout(){

localStorage.removeItem("sesion");

location.reload();

}

function agregar(nombre,precio){

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

carrito.push({nombre:nombre,precio:precio});

localStorage.setItem("carrito", JSON.stringify(carrito));

actualizarCarrito();

}

function actualizarCarrito(){

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

document.getElementById("contador").innerText = carrito.length;

let html="";
let total=0;

carrito.forEach((p,i)=>{

html += p.nombre+" - $"+p.precio+
" <button onclick='eliminar("+i+")'>X</button><br>";

total += p.precio;

});

document.getElementById("listaCarrito").innerHTML = html;

document.getElementById("total").innerText = "Total: $" + total;

}

function eliminar(i){

let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

carrito.splice(i,1);

localStorage.setItem("carrito", JSON.stringify(carrito));

actualizarCarrito();

}

function vaciar(){

localStorage.removeItem("carrito");

actualizarCarrito();

}

function abrirCarrito(){

document.getElementById("modalCarrito").style.display="flex";

}

function cerrarCarrito(){

document.getElementById("modalCarrito").style.display="none";

}

</script>

</body>
</html>
